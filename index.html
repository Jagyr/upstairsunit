    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upstairs Unit</title>
    <style>
        /* Reset default spacing */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* Background image */
        body {
            margin: 0;
            height: 100vh;

            background:
                radial-gradient(circle at 20% 30%, rgba(120, 80, 255, 0.35), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.25), transparent 40%),
                radial-gradient(circle at 30% 80%, rgba(180, 0, 255, 0.25), transparent 45%),
                radial-gradient(circle at 70% 75%, rgba(255, 0, 200, 0.15), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(0, 100, 255, 0.2), transparent 50%),
                linear-gradient(135deg, #0a0a1f, #120a2a, #1a1035);

            background-blend-mode: screen;
            color: white;
            font-family: Arial, sans-serif;
            animation: moveGradient 20s ease infinite alternate;
        }

        @keyframes moveGradient {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }

        /* Center content */
        .overlay {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4); /* dark overlay */
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
        }

        p {
            font-size: 1.2rem;
        }

        .spotify-btn {
            display: inline-block;
            padding: 16px 34px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 50px;

            background: linear-gradient(270deg, #1db954, #1ed760, #0f9d58, #1db954);
            background-size: 300% 300%;

            animation: gradientShift 6s ease infinite;

            box-shadow: 0 10px 30px rgba(30, 215, 96, 0.3);
            transition: transform 0.2s ease;
        }

        .spotify-btn:hover {
            transform: scale(1.08);
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
